name: Conditional Auto Approve and Label

on:
  check_suite:
    types: [completed]
  status:

jobs:
  check-and-approve:
    runs-on: ubuntu-latest
    if: github.repository == 'PankajSingh34/AlgoBuddy'
    steps:
      - name: Check Statuses, Approve and Label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            let pullRequests = [];
            
            if (context.eventName === 'check_suite') {
              pullRequests = context.payload.check_suite.pull_requests;
            } else {
              const sha = context.payload.sha;
              const prs = await github.rest.pulls.list({ owner, repo, state: 'open' });
              pullRequests = prs.data.filter(pr => pr.head.sha === sha);
            }

            if (pullRequests.length === 0) return;

            const prNumber = pullRequests[0].number;
            const prRef = pullRequests[0].head.sha;

            const statuses = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref: prRef });
            const checkRuns = await github.rest.checks.listForRef({ owner, repo, ref: prRef });

            let allOthersPassed = true;
            let evaluatedChecksCount = 0;

            for (const status of statuses.data.statuses) {
              if (status.context.toLowerCase().includes('vercel')) continue;
              evaluatedChecksCount++;
              if (status.state !== 'success') allOthersPassed = false;
            }

            for (const run of checkRuns.data.check_runs) {
              if (run.name.toLowerCase().includes('vercel') || run.app?.slug?.toLowerCase().includes('vercel')) continue;
              if (run.status !== 'completed') {
                allOthersPassed = false;
              } else if (run.conclusion !== 'success' && run.conclusion !== 'neutral') {
                allOthersPassed = false;
              }
              evaluatedChecksCount++;
            }

            if (allOthersPassed && evaluatedChecksCount > 0) {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: 'code looks good',
              });

              const prData = pullRequests[0];
              const title = (prData.title || "").toLowerCase();
              const body = (prData.body || "").toLowerCase();
              
              let labelsToAdd = ['gssoc:approved']; 

              if (title.includes('advanced') || body.includes('advanced') || title.includes('hard') || body.includes('hard')) {
                labelsToAdd.push('level:advanced');
              } else if (title.includes('intermediate') || body.includes('intermediate') || title.includes('medium') || body.includes('medium')) {
                labelsToAdd.push('level:intermediate');
              } else {
                labelsToAdd.push('level:beginner');
              }

              if (title.includes('fix') || title.includes('bug') || body.includes('bug')) {
                labelsToAdd.push('type:bug');
              } else if (title.includes('feat') || title.includes('add') || body.includes('feature')) {
                labelsToAdd.push('type:feature');
              } else if (title.includes('doc') || title.includes('readme')) {
                labelsToAdd.push('type:docs');
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: labelsToAdd
              });

              console.log(`Successfully assigned labels to PR #${prNumber}`);
            }
